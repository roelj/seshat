{{- $virtuoso := .Values.virtuoso | default dict }}
{{- $password := $virtuoso.dbaPassword | default "" }}
{{- if not $password }}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace "virtuoso-dba-credentials" }}
  {{- if and $existing $existing.data (index $existing.data "dba-password") }}
    {{- $password = (index $existing.data "dba-password" | b64dec) }}
  {{- else }}
    {{- $password = randAlphaNum 24 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: virtuoso-dba-credentials
type: Opaque
stringData:
  dba-password: {{ $password | quote }}
